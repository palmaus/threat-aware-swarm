[pytest]
addopts = -q
python_files = test_*.py
markers =
    integration: end-to-end pipeline tests
    tuning_stageb: heavy tuning holdout/benchmark/OOD smoke tests, skipped unless --run-tuning-stageb is passed
filterwarnings =
    ignore:The `render_mode` attribute is not defined in your environment:UserWarning
    ignore:Unable to import Axes3D:UserWarning
    ignore:Mean of empty slice:RuntimeWarning
    ignore:pkg_resources is deprecated as an API.*:UserWarning
    ignore:.*pkg_resources is deprecated.*:DeprecationWarning
    ignore:Deprecated call to `pkg_resources.declare_namespace.*:DeprecationWarning
